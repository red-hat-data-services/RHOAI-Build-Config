{{- if .Values.enabled }}
{{- if .Values.hooks.postInstallCrs.enabled }}
{{- $componentCRs := include "rhai-on-xks-chart.enabledComponentCRs" . | fromJson }}
{{- $providerKECR := include "rhai-on-xks-chart.enabledProviderKECR" . }}
{{- $keResource := include "rhai-on-xks-chart.keResourceName" . }}
{{- $createGateway := and .Values.components.kserve.enabled .Values.components.kserve.gateway.create }}
{{- $gatewayTls := and $createGateway .Values.gateway.tls.enabled }}
{{- $appNs := .Values.rhaiOperator.applicationsNamespace }}
{{- $issuerName := .Values.gateway.tls.issuerRef.name }}
{{- $issuerKind := .Values.gateway.tls.issuerRef.kind }}
{{- if or $componentCRs $providerKECR $createGateway }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rhai-post-install-hook
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rhai-on-xks-chart.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rhai-post-install-hook
  labels:
    {{- include "rhai-on-xks-chart.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
rules:
  {{- $compRegistry := include "rhai-on-xks-chart.componentCRRegistry" . | fromYaml }}
  {{- range $name := keys $compRegistry | sortAlpha }}
    {{- $meta := index $compRegistry $name }}
    {{- $compVals := index $.Values.components $name | default dict }}
    {{- if $compVals.enabled }}
  - apiGroups:
      - {{ index $meta "apiGroup" }}
    resources:
      - {{ index $meta "resource" }}
    verbs:
      - get
      - create
      - patch
      - update
    {{- end }}
  {{- end }}
  {{- if $keResource }}
  - apiGroups:
      - infrastructure.opendatahub.io
    resources:
      - {{ $keResource }}
    verbs:
      - get
      - create
      - patch
      - update
  {{- end }}
  {{- if $createGateway }}
  - apiGroups:
      - gateway.networking.k8s.io
    resources:
      - gateways
    verbs:
      - get
      - create
      - patch
      - update
  - apiGroups:
      - gateway.networking.k8s.io
    resources:
      - gatewayclasses
    verbs:
      - get
  - apiGroups:
      - apiextensions.k8s.io
    resources:
      - customresourcedefinitions
    verbs:
      - get
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - get
      - create
      - patch
      - update
  {{- if and $gatewayTls (eq $issuerKind "ClusterIssuer") }}
  # ClusterIssuers are cluster-scoped, so the read must live on the ClusterRole,
  # but it is restricted to the single issuer the gateway Certificate references.
  - apiGroups:
      - cert-manager.io
    resources:
      - clusterissuers
    resourceNames:
      - {{ $issuerName }}
    verbs:
      - get
  {{- end }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rhai-post-install-hook
  labels:
    {{- include "rhai-on-xks-chart.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: rhai-post-install-hook
subjects:
  - kind: ServiceAccount
    name: rhai-post-install-hook
    namespace: {{ .Release.Namespace }}
{{- if $gatewayTls }}
---
# Certificate is namespaced to the applications namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rhai-post-install-hook-cert
  namespace: {{ $appNs }}
  labels:
    {{- include "rhai-on-xks-chart.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
rules:
  - apiGroups:
      - cert-manager.io
    resources:
      - certificates
    verbs:
      - get
      - create
      - patch
      - update
  {{- if eq $issuerKind "Issuer" }}
  - apiGroups:
      - cert-manager.io
    resources:
      - issuers
    resourceNames:
      - {{ $issuerName }}
    verbs:
      - get
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rhai-post-install-hook-cert
  namespace: {{ $appNs }}
  labels:
    {{- include "rhai-on-xks-chart.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: rhai-post-install-hook-cert
subjects:
  - kind: ServiceAccount
    name: rhai-post-install-hook
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
