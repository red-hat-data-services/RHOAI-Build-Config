    - name: RELATED_IMAGE_ODH_KSERVE_ROUTER_IMAGE
      value: "registry.redhat.io/rhoai/odh-kserve-router-rhel9@sha256:c3bacd646790bf861ec0baab326051bd786cf8e15496c0170f24215c2f4c9a33"
