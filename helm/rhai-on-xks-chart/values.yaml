  # Example:
  # relatedImages:
  #   - name: RELATED_IMAGE_ODH_KSERVE_CONTROLLER_IMAGE
  #     value: quay.io/opendatahub/kserve-controller:latest

hooks:
  cliImage: "registry.redhat.io/openshift4/ose-cli-rhel9@sha256:22efc645cefc1024ce5e73085def68d82e2ba3a3b410038d86af1edf68ed0e80"
  # Default resources for all hook job containers
  resources:
    limits:
      cpu: 200m
      memory: 512Mi
    requests:
      cpu: 50m
      memory: 64Mi
  postInstallCrs:
    enabled: true

# Cluster wise config for gateway for tls, shared config for all components section below
gateway:
  # External hostname e.g. "*.mycompany.com", if empty, only cluster-internal DNS (svc.cluster.local) to use
  hostname: ""
  tls:
    # When false, gateways are HTTP only
    enabled: true
    # Default is set to use rhai managed internal CA, handled by operator
    # to bring your own ClusterIssuer/Issuer (e.g. Let's Encrypt), ensure it is Ready in the cluster before config it below
    issuerRef:
      name: rhai-ca-issuer
      kind: ClusterIssuer
    # Extra dnsNames added to the certificate (multi-domain / wildcard).
    additionalSANs: []

# Components configuration
components:
  kserve:
    # Create Kserve CR via post-install hook
    enabled: true
    spec: {}
    # Gateway configuration for KServe inference
    gateway:
      # Create Gateway and ConfigMaps via post-install hook
      create: true
      allowedRoutes:
        namespaces:
          # Which namespaces can attach HTTPRoutes to the Gateway (All, Same, or Selector).
          # Defaults to Same (secure by default): only the Gateway's own namespace can attach routes.
          from: Same
          # Example for All (any namespace can attach routes):
          # from: All
          #
          # Example for Selector (only namespaces matching labels):
          # from: Selector
          # selector:
          #   matchLabels:
          #     inference-gateway-access: "true"

  aigateway:
    # Enable operator-managed AIGateway module (includes Models as a Service)
    enabled: false
    # AIGateway component CR spec — sets modelsAsAService.managementState: Managed on the AIGateway CR
    spec:
      modelsAsAService:
        managementState: Managed
    # Models as a Service (MaaS) configuration
    modelsAsAService:
      # MaaS gateway configuration
      gateway:
        # Create MaaS Gateway, certs, and CA bundles via post-install hook
        create: true
        # Namespace for the MaaS Gateway (defaults to the applications namespace)
        namespace: ""
        # Name for the MaaS Gateway resource
        name: maas-default-gateway
        # GatewayClass to use for the MaaS Gateway
        gatewayClassName: istio
        allowedRoutes:
          namespaces:
            # Which namespaces can attach HTTPRoutes to the MaaS Gateway (All, Same, or Selector).
            # Defaults to Same (secure by default): only the Gateway's own namespace can attach routes.
            from: Same
            # Example for All (any namespace can attach routes):
            # from: All
            #
            # Example for Selector (only namespaces matching labels):
            # from: Selector
            # selector:
            #   matchLabels:
            #     maas-gateway-access: "true"

# Azure cloud configuration
azure:
  enabled: false
  cloudManager:
    # Cloud Manager operator namespace
    namespace: rhai-cloudmanager-system
    # Cloud Manager container image
    image: "registry.redhat.io/rhoai/odh-rhel9-operator@sha256:dcfce446d407e35038a1409dfb9ba828aafc3596b21248b9547cd020d37e1dd8"
    # Image pull policy
    imagePullPolicy: Always
    # Number of cloud manager replicas
    replicas: 1
    # Resources for the cloud manager container
    resources:
      limits:
        cpu: 500m
        memory: 1Gi
      requests:
        cpu: 100m
        memory: 256Mi
  kubernetesEngine:
    # Create AzureKubernetesEngine CR via post-install hook
    enabled: true
    spec:
      dependencies:
        certManager:
          managementPolicy: Managed
          configuration: {}
        gatewayAPI:
          managementPolicy: Managed
          configuration: {}
        lws:
          managementPolicy: Unmanaged   # Required only when need run WideEP, set to Managed then
          configuration:
            namespace: openshift-lws-operator
        sailOperator:
          managementPolicy: Managed
          configuration:
            namespace: istio-system

