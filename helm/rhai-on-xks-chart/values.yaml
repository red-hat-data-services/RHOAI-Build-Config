# Enable/disable all resource creation
enabled: true

# Install CRDs or not using the chart
installCRDs: true

# Common labels applied to all resources
labels: {}

# RHAI Operator configuration
rhaiOperator:
  # Operator namespace
  namespace: redhat-ods-operator
  applicationsNamespace: redhat-ods-applications
  # Manager container image
  image: "registry.redhat.io/rhoai/odh-rhel9-operator@sha256:d106b49a1fcecb9ca499bdb463e36e682a270324dff99c2538dedd51e5316091" # image is updated during Helm chart build by konflux
  # Image pull policy
  imagePullPolicy: Always
  # Related images env vars (RELATED_IMAGE_*)
  relatedImages:
    - name: RELATED_IMAGE_ODH_KSERVE_AGENT_IMAGE
      value: "registry.redhat.io/rhoai/odh-kserve-agent-rhel9@sha256:d713f6185858ae4d143d766582c93ac9326df9dee62953782a3a84ccb7eb5854"
    - name: RELATED_IMAGE_ODH_KSERVE_CONTROLLER_IMAGE
      value: "registry.redhat.io/rhoai/odh-kserve-controller-rhel9@sha256:7057da21cb476e1500ac39e301f255286ad0f1748c30166a1507999db724afe1"
    - name: RELATED_IMAGE_ODH_KSERVE_LLMISVC_CONTROLLER_IMAGE
      value: "registry.redhat.io/rhoai/odh-kserve-llmisvc-controller-rhel9@sha256:cb7b645884f5e446f736c5aa8914b94db70a0a0bb4e376f612ab952550513267"
    - name: RELATED_IMAGE_ODH_KSERVE_ROUTER_IMAGE
      value: "registry.redhat.io/rhoai/odh-kserve-router-rhel9@sha256:875b22edb4d94ffb6c23fea4e2d060a908fe86b1374d4ebea4e70a56ab598cfc"
    - name: RELATED_IMAGE_ODH_KSERVE_STORAGE_INITIALIZER_IMAGE
      value: "registry.redhat.io/rhoai/odh-kserve-storage-initializer-rhel9@sha256:d9f53824f82b4504e4319223e9ff38122b40624f1b5a2e562a2cc85b10d06366"
    - name: RELATED_IMAGE_RHAII_VLLM_CUDA_IMAGE
      value: "registry.redhat.io/rhaii/vllm-cuda-rhel9@sha256:ad06abf3bb5235ebb5b2df84cd1b9fd09e823f0ff2eebfc82bb4590275ccfe0b"
    - name: RELATED_IMAGE_RHAII_VLLM_GAUDI_IMAGE
      value: "registry.redhat.io/rhaii/vllm-gaudi-rhel9@sha256:71008b2151586551ec0969ffc5b175f726ed6f6bebee29cdc289549e216609bc"
    - name: RELATED_IMAGE_RHAII_VLLM_ROCM_IMAGE
      value: "registry.redhat.io/rhaii/vllm-rocm-rhel9@sha256:98375507f524731a76877fb7ac5451be6fabbf8751e18802943ae8abe44a9bca"
    - name: RELATED_IMAGE_RHAII_VLLM_SPYRE_IMAGE
      value: "registry.redhat.io/rhaii/vllm-spyre-rhel9@sha256:61ee874175b314a4d5425e68b4320ef53af2318c58ef7e74e77d8bbf5183fc33"
    - name: RELATED_IMAGE_ODH_LLM_D_INFERENCE_SCHEDULER_IMAGE
      value: "registry.redhat.io/rhoai/odh-llm-d-inference-scheduler-rhel9@sha256:7b4d549848b52836903bdff0644c52c83d705f2b24ba6f4215c617f317ba1817"
    - name: RELATED_IMAGE_ODH_LLM_D_ROUTING_SIDECAR_IMAGE
      value: "registry.redhat.io/rhoai/odh-llm-d-routing-sidecar-rhel9@sha256:e11da2d33a6d01c706a384bea183eea4e110811696c2c95e210ff0021cd109de"
    - name: RELATED_IMAGE_OSE_KUBE_RBAC_PROXY_IMAGE
      value: "registry.redhat.io/rhoai/odh-kube-auth-proxy-rhel9@sha256:dd27b49e0f0714f3841f8bc0b1612b95f779444afaa9fa08efe8faf9866a5032"
    - name: RELATED_IMAGE_ODH_LLM_D_KV_CACHE_IMAGE
      value: "registry.redhat.io/rhoai/odh-llm-d-kv-cache-rhel9@sha256:a3c4cd24b02ed05b19bbf1151daa7c310461b34f5fbd7c7a893a82d31eeb5d85"

  # Example:
  # relatedImages:
  #   - name: RELATED_IMAGE_ODH_KSERVE_CONTROLLER_IMAGE
  #     value: quay.io/opendatahub/kserve-controller:latest

hooks:
  cliImage: "registry.redhat.io/openshift4/ose-cli-rhel9@sha256:7feb4aac0703a07483fb3b0d49bd8db240b7d18604657a2b89ba537c8dbbd64b"
  postInstallCrs:
    enabled: true

# Components configuration
components:
  kserve:
    # Create Kserve CR via post-install hook
    enabled: true
    spec: {}
    # Gateway configuration for KServe inference
    gateway:
      # Create Gateway and ConfigMaps via post-install hook
      create: true

# Azure cloud configuration
azure:
  enabled: false
  cloudManager:
    # Cloud Manager operator namespace
    namespace: rhai-cloudmanager-system
    # Cloud Manager container image
    image: "registry.redhat.io/rhoai/odh-rhel9-operator@sha256:d106b49a1fcecb9ca499bdb463e36e682a270324dff99c2538dedd51e5316091"
    # Image pull policy
    imagePullPolicy: Always
  kubernetesEngine:
    # Create AzureKubernetesEngine CR via post-install hook
    enabled: true
    spec:
      dependencies:
        certManager:
          configuration: {}
          managementPolicy: Managed
        gatewayAPI:
          configuration: {}
          managementPolicy: Managed
        lws:
          configuration: {}
          managementPolicy: Managed
        sailOperator:
          configuration: {}
          managementPolicy: Managed

# CoreWeave cloud configuration
coreweave:
  enabled: false
  cloudManager:
    # Cloud Manager operator namespace
    namespace: rhai-cloudmanager-system
    # Cloud Manager container image
    image: "registry.redhat.io/rhoai/odh-rhel9-operator@sha256:d106b49a1fcecb9ca499bdb463e36e682a270324dff99c2538dedd51e5316091"
    # Image pull policy
    imagePullPolicy: Always
  kubernetesEngine:
    # Create CoreWeaveKubernetesEngine CR via post-install hook
    enabled: true
    spec:
      dependencies:
        certManager:
          configuration: {}
          managementPolicy: Managed
        gatewayAPI:
          configuration: {}
          managementPolicy: Managed
        lws:
          configuration: {}
          managementPolicy: Managed
        sailOperator:
          configuration: {}
          managementPolicy: Managed

# Pull secret for private registries
# Use --set-file imagePullSecret.dockerConfigJson=path/to/auth.json
imagePullSecret:
  # Name of the pull secret to create in target namespaces. This name MUST not be changed
  # as it is referred also in other installed dependencies and not yet configurable.
  name: rhai-pull-secret
  # Docker config JSON content (populated via --set-file)
  dockerConfigJson: ""
  # Namespaces created by dependency operators where pull secrets should be injected
  dependencyNamespaces:
    - cert-manager-operator
    - cert-manager
    - openshift-lws-operator
    - istio-system
