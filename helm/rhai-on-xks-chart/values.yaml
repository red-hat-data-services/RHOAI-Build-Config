      value: "registry.redhat.io/rhaii/vllm-cpu-rhel9@sha256:562aeaf7dabfccccf9ecc2d8c0e7d84d813778f146dd9d5c8e3a1d595d07a82c"
    - name: RELATED_IMAGE_RHAII_VLLM_GAUDI_IMAGE
