    - name: RELATED_IMAGE_ODH_LLM_D_INFERENCE_SCHEDULER_IMAGE
      value: "registry.redhat.io/rhoai/odh-llm-d-inference-scheduler-rhel9@sha256:d480c1ab191831c358158d1b4e669c71ea975fcc797f20e18e1c0139bda5fbd0"
    - name: RELATED_IMAGE_ODH_LLM_D_ROUTING_SIDECAR_IMAGE
      value: "registry.redhat.io/rhoai/odh-llm-d-routing-sidecar-rhel9@sha256:4749b6ecdf288a95e72248aed914af701005dfa29362e435243e77c83bb74e1c"
