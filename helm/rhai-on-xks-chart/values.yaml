    - name: RELATED_IMAGE_ODH_KSERVE_ROUTER_IMAGE
      value: "registry.redhat.io/rhoai/odh-kserve-router-rhel9@sha256:35b7621e27c8d287c53511614fdac1a34b9b1156ed761aa7c59aea9d00ab43b7"
