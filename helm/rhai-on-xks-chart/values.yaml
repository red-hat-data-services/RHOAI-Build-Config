# Enable/disable all resource creation
enabled: true

# Install CRDs or not using the chart
installCRDs: true

# Common labels applied to all resources
labels: {}

# RHAI Operator configuration
rhaiOperator:
  # Operator namespace
  namespace: redhat-ods-operator
  applicationsNamespace: redhat-ods-applications
  # Manager container image
  image: "registry.redhat.io/rhoai/odh-rhel9-operator@sha256:6ea440a9a50a56f79cec3ba1bc93743b37971086b9daf2dfc2126cc5f772bf03" # image is updated during Helm chart build by konflux
  # Image pull policy
  imagePullPolicy: Always
  # Number of operator replicas
  replicas: 1
  # Resources for the main manager container
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 300m
      memory: 256Mi
  # Resources for the copy-manifests init container
  initResources:
    limits:
      cpu: 100m
      memory: 512Mi
    requests:
      cpu: 10m
      memory: 64Mi
  # Related images env vars (RELATED_IMAGE_*)
  relatedImages:
    - name: RELATED_IMAGE_ODH_KSERVE_AGENT_IMAGE
      value: "registry.redhat.io/rhoai/odh-kserve-agent-rhel9@sha256:4af84404da26f567118a0784df3fbb0e8a9995370fecef626ec9c029e0a3de22"
    - name: RELATED_IMAGE_ODH_KSERVE_CONTROLLER_IMAGE
