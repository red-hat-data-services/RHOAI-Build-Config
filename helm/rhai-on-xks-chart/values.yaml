# Enable/disable all resource creation
enabled: true

# Install CRDs or not using the chart
installCRDs: true

# Common labels applied to all resources
labels: {}

# RHAI Operator configuration
rhaiOperator:
  # Operator namespace
  namespace: redhat-ods-operator
  applicationsNamespace: redhat-ods-applications
  # Manager container image
  image: "registry.redhat.io/rhoai/odh-rhel9-operator@sha256:5fd9bc217aa1af6a21c300adbe0d19305020aaa44597b60585a44af0990e420d" # image is updated during Helm chart build by konflux
  # Image pull policy
  imagePullPolicy: Always
  # Related images env vars (RELATED_IMAGE_*)
  relatedImages:
    - name: RELATED_IMAGE_ODH_KSERVE_AGENT_IMAGE
      value: "registry.redhat.io/rhoai/odh-kserve-agent-rhel9@sha256:f0526b2ec251840d2d4059d746f4c6da427606d8381136cbdc3f9eedcbcb9a0c"
