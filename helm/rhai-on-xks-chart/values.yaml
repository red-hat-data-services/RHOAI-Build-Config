      value: "registry.redhat.io/rhoai/odh-kube-rbac-proxy-rhel9@sha256:84459a75f19a225c932cdff52fd81f21e8cacc1fc48b236b0b82e2f1412da37e"
    - name: RELATED_IMAGE_ODH_LLM_D_KV_CACHE_IMAGE
