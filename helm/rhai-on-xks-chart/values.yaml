# Enable/disable all resource creation
enabled: true

# Install CRDs or not using the chart
installCRDs: true

# Common labels applied to all resources
labels: {}

# RHAI Operator configuration
rhaiOperator:
  # Operator namespace
  namespace: redhat-ods-operator
  applicationsNamespace: redhat-ods-applications
  # Manager container image
  image: "registry.redhat.io/rhoai/odh-rhel9-operator@sha256:7dd716903968279d17432d606575a55f2f4b8ae86227356d87a5ab2285a6511b" # image is updated during Helm chart build by konflux
  # Image pull policy
  imagePullPolicy: Always
  # Number of operator replicas
  replicas: 1
  # Resources for the main manager container
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 300m
      memory: 256Mi
  # Resources for the copy-manifests init container
  initResources:
    limits:
      cpu: 100m
      memory: 512Mi
    requests:
      cpu: 10m
      memory: 64Mi
  # Related images env vars (RELATED_IMAGE_*)
  relatedImages:
    - name: RELATED_IMAGE_ODH_KSERVE_AGENT_IMAGE
      value: "registry.redhat.io/rhoai/odh-kserve-agent-rhel9@sha256:d3034040ccf5a54f13af4c742fd54591943a1bbc77dff1263f1ea449a756d501"
