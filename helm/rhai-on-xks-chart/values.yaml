  enabled: false
  cloudManager:
    # Cloud Manager operator namespace
    namespace: rhai-cloudmanager-system
    # Cloud Manager container image
    image: "registry.redhat.io/rhoai/odh-rhel9-operator@sha256:33f857fececd58bbbd6eb69a4616f56cadd514f08bfb28ccfb2304ca761731b5"
    # Image pull policy
    imagePullPolicy: Always
