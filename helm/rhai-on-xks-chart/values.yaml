# Enable/disable all resource creation
enabled: true

# Install CRDs or not using the chart
installCRDs: true

# Common labels applied to all resources
labels: {}

# RHAI Operator configuration
rhaiOperator:
  # Operator namespace
  namespace: redhat-ods-operator
  applicationsNamespace: redhat-ods-applications
  # Manager container image
  image: "registry.redhat.io/rhoai/odh-rhel9-operator@sha256:e68861f54b73e546349ed3993efb7884582f6b30e5f13a22cd2f0fb9b2dda5e0" # image is updated during Helm chart build by konflux
  # Image pull policy
  imagePullPolicy: Always
  # Related images env vars (RELATED_IMAGE_*)
  relatedImages:
    - name: RELATED_IMAGE_ODH_KSERVE_AGENT_IMAGE
      value: "registry.redhat.io/rhoai/odh-kserve-agent-rhel9@sha256:7e696224ad37fca44f014effe60273597d07c75e771cca80ed33e9dfb03de558"
    - name: RELATED_IMAGE_ODH_KSERVE_CONTROLLER_IMAGE
      value: "registry.redhat.io/rhoai/odh-kserve-controller-rhel9@sha256:0cc64ee6cfb1fb42949a3f7f119d4a2b247f1d3b55ac42003628d75fa7d72231"
    - name: RELATED_IMAGE_ODH_KSERVE_LLMISVC_CONTROLLER_IMAGE
      value: "registry.redhat.io/rhoai/odh-kserve-llmisvc-controller-rhel9@sha256:797906ceea2e9d65907a6f7faca69584e29749c8e00a51cf5fe64917a51d2018"
    - name: RELATED_IMAGE_ODH_KSERVE_ROUTER_IMAGE
      value: "registry.redhat.io/rhoai/odh-kserve-router-rhel9@sha256:5e5c2291c7097a0f5e1afa8ed139fde222e5b92196f576b01bd85aa5d328340f"
    - name: RELATED_IMAGE_ODH_KSERVE_STORAGE_INITIALIZER_IMAGE
      value: "registry.redhat.io/rhoai/odh-kserve-storage-initializer-rhel9@sha256:294c864d04f2ef1ba2fc2080f7eebc4d67252cce1282a46f6b416179264c8c00"
    - name: RELATED_IMAGE_RHAIIS_VLLM_CUDA_IMAGE
      value: "registry.redhat.io/rhaiis/vllm-cuda-rhel9@sha256:ec799bb5eeb7e25b4b25a8917ab5161da6b6f1ab830cbba61bba371cffb0c34d"
    - name: RELATED_IMAGE_RHAIIS_VLLM_ROCM_IMAGE
      value: "registry.redhat.io/rhaiis/vllm-rocm-rhel9@sha256:e345cf9453afae0d3c2afe2f7fb9be8fac772f46593b873e925d38ae2b3ee537"
    - name: RELATED_IMAGE_RHAIIS_VLLM_SPYRE_IMAGE
      value: "registry.redhat.io/rhaiis/vllm-spyre-rhel9@sha256:75f0ea05a92661a33b40efe2a662d976d53c767db18990b433d4a00dd6693aae"
    - name: RELATED_IMAGE_ODH_LLM_D_INFERENCE_SCHEDULER_IMAGE
      value: "registry.redhat.io/rhoai/odh-llm-d-inference-scheduler-rhel9@sha256:f8b4d54ed266acf1ea2fff6ea0614f47fcc03031df4cff0f1f804d60c22debb0"
    - name: RELATED_IMAGE_ODH_LLM_D_ROUTING_SIDECAR_IMAGE
      value: "registry.redhat.io/rhoai/odh-llm-d-routing-sidecar-rhel9@sha256:b922039c37933f6ba4f91476c12a7db1d703db10066408fd949f38617406dc66"
    - name: RELATED_IMAGE_OSE_KUBE_RBAC_PROXY_IMAGE
      value: "registry.redhat.io/rhoai/odh-kube-auth-proxy-rhel9@sha256:5f038c1eeeb8b46d595a735fdd68d642b4b9b4d4a50545854be5d05284e113d6"
    - name: RELATED_IMAGE_ODH_LLM_D_KV_CACHE_IMAGE
      value: "registry.redhat.io/rhoai/odh-llm-d-kv-cache-rhel9@sha256:6a4bbbe23d191c86bfc96ab0334c9cda5f9e1ea2e136acde61dbd0269d33bbda"

  # Example:
  # relatedImages:
  #   - name: RELATED_IMAGE_ODH_KSERVE_CONTROLLER_IMAGE
  #     value: quay.io/opendatahub/kserve-controller:latest

hooks:
  cliImage: registry.redhat.io/openshift4/ose-cli-rhel9:v4.20@sha256:d876c1d98b39d65c00c4261431bb84b90284699f3aef84d8701a25c786fb79a1
  postInstallCrs:
    enabled: true

# Components configuration
components:
  kserve:
    # Create Kserve CR via post-install hook
    enabled: true
    spec: {}
    # Gateway configuration for KServe inference
    gateway:
      # Create Gateway and ConfigMaps via post-install hook
      create: true

# Azure cloud configuration
azure:
  enabled: false
  cloudManager:
    # Cloud Manager operator namespace
    namespace: rhai-cloudmanager-system
    # Cloud Manager container image
    image: "registry.redhat.io/rhoai/odh-rhel9-operator@sha256:e68861f54b73e546349ed3993efb7884582f6b30e5f13a22cd2f0fb9b2dda5e0"
    # Image pull policy
    imagePullPolicy: Always
  kubernetesEngine:
    # Create AzureKubernetesEngine CR via post-install hook
    enabled: true
    spec:
      dependencies:
        certManager:
          configuration: {}
          managementPolicy: Managed
        gatewayAPI:
          configuration: {}
          managementPolicy: Managed
        lws:
          configuration: {}
          managementPolicy: Managed
        sailOperator:
          configuration: {}
          managementPolicy: Managed

# CoreWeave cloud configuration
coreweave:
  enabled: false
  cloudManager:
    # Cloud Manager operator namespace
    namespace: rhai-cloudmanager-system
    # Cloud Manager container image
    image: "registry.redhat.io/rhoai/odh-rhel9-operator@sha256:e68861f54b73e546349ed3993efb7884582f6b30e5f13a22cd2f0fb9b2dda5e0"
    # Image pull policy
    imagePullPolicy: Always
  kubernetesEngine:
    # Create CoreWeaveKubernetesEngine CR via post-install hook
    enabled: true
    spec:
      dependencies:
        certManager:
          configuration: {}
          managementPolicy: Managed
        gatewayAPI:
          configuration: {}
          managementPolicy: Managed
        lws:
          configuration: {}
          managementPolicy: Managed
        sailOperator:
          configuration: {}
          managementPolicy: Managed

# Pull secret for private registries
# Use --set-file imagePullSecret.dockerConfigJson=path/to/auth.json
imagePullSecret:
  # Name of the pull secret to create in target namespaces. This name MUST not be changed
  # as it is referred also in other installed dependencies and not yet configurable.
  name: rhai-pull-secret
  # Docker config JSON content (populated via --set-file)
  dockerConfigJson: ""
  # Namespaces created by dependency operators where pull secrets should be injected
  dependencyNamespaces:
    - cert-manager-operator
    - cert-manager
    - openshift-lws-operator
    - istio-system
