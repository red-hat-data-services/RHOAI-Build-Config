# Enable/disable all resource creation
enabled: true

# Install CRDs or not using the chart
installCRDs: true

# Common labels applied to all resources
labels: {}

# RHAI Operator configuration
rhaiOperator:
  # Operator namespace
  namespace: redhat-ods-operator
  applicationsNamespace: redhat-ods-applications
  # Manager container image
  image: "registry.redhat.io/rhoai/odh-rhel9-operator@sha256:22face7cae23427135c57e9ffbf0e76a0e23ee702990607b779b1ecc9bcf958c" # image is updated during Helm chart build by konflux
  # Image pull policy
  imagePullPolicy: Always
  # Number of operator replicas
  replicas: 1
  # Resources for the main manager container
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 300m
      memory: 256Mi
  # Resources for the copy-manifests init container
  initResources:
    limits:
      cpu: 100m
      memory: 512Mi
    requests:
      cpu: 10m
      memory: 64Mi
  # Related images env vars (RELATED_IMAGE_*)
  relatedImages:
    - name: RELATED_IMAGE_ODH_KSERVE_AGENT_IMAGE
      value: "registry.redhat.io/rhoai/odh-kserve-agent-rhel9@sha256:89b3f3c0c712344479839f4685cb5b7a969f82cd15927c7ffe626924863a6036"
