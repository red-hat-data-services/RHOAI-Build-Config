# Enable/disable all resource creation
enabled: true

# Install CRDs or not using the chart
installCRDs: true

# Common labels applied to all resources
labels: {}

# Behavior on helm uninstall
uninstall:
  # Delete dependency namespaces (e.g. istio-system) created by pre-install hooks.
  # Disabled by default: these namespaces may contain user workloads.
  cleanupNamespaces: false

# RHAI Operator configuration
rhaiOperator:
  # Operator namespace
  namespace: redhat-ods-operator
  applicationsNamespace: redhat-ods-applications
  # Manager container image
  image: "registry.redhat.io/rhoai/odh-rhel9-operator@sha256:60d0d8ba1f1db55b5201edb7aefda895bedcd5db61ff71f69564f7bcbf784f88" # image is updated during Helm chart build by konflux
  # Image pull policy
  imagePullPolicy: Always
  # Number of operator replicas
  replicas: 1
  # Resources for the main manager container
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 300m
      memory: 256Mi
  # Resources for the copy-manifests init container
  initResources:
    limits:
      cpu: 100m
      memory: 512Mi
    requests:
      cpu: 10m
      memory: 64Mi
