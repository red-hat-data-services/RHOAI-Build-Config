{{- if .Values.enabled }}
{{- if and .Values.components.aigateway.enabled .Values.components.aigateway.modelsAsAService.gateway.create }}
apiVersion: batch/v1
kind: Job
metadata:
  name: rhai-post-create-maas-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rhai-on-xks-chart.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "3"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "rhai-on-xks-chart.labels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      serviceAccountName: rhai-post-install-hook
      {{- include "rhai-on-xks-chart.imagePullSecrets" . | nindent 6 }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: create-maas-gateway
          image: {{ required "hooks.cliImage is required" .Values.hooks.cliImage | quote }}
          resources:
            {{- toYaml .Values.hooks.resources | nindent 12 }}
          securityContext:
            runAsUser: 65534
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          command:
            - /bin/bash
            - -c
            - |
              {{- tpl (.Files.Get "files/create-maas-gateway.sh") . | nindent 14 }}
{{- end }}
{{- end }}
