        replaces: rhods-operator.3.3.2
        skipRange: '>=3.3.0 <3.3.3'
    - name: support-required-upgrade
      package: rhods-operator
      schema: olm.channel
      entries:
      - name: rhods-operator.3.3.3
        skipRange: '>=2.25.4 <2.26.0'

  olm.bundle:
