patch:
  olm.package:
    name: rhods-operator
    defaultChannel: stable-3.x
  olm.channels:
    - name: stable-3.x
      package: rhods-operator
      schema: olm.channel
      entries:
        - name: rhods-operator.3.5.0
          replaces: rhods-operator.3.4.2
          skipRange: '>=3.4.0 <3.5.0'
    - name: stable-3.5
      package: rhods-operator
      schema: olm.channel
      entries:
        - name: rhods-operator.3.5.0
          skipRange: '>=3.4.0 <3.5.0'
    - name: eus-3.5
      package: rhods-operator
      schema: olm.channel
      entries:
        - name: rhods-operator.3.5.0
    - name: support-required-upgrade-3.5
      package: rhods-operator
      schema: olm.channel
      entries:
      - name: rhods-operator.3.5.0
        skipRange: '>=2.25.8 <2.26.0'

  olm.bundle:
    - quay.io/rhoai/odh-operator-bundle@sha256:4d5d40cba16c317de6342afe4c2d90edb975ea73add08a504e62225d675e78ce
    # only for nudging purpose
