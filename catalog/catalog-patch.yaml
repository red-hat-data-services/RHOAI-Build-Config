patch:
  olm.package:
    name: rhods-operator
    defaultChannel: stable-3.x
  olm.channels:
    - name: stable-3.x
      package: rhods-operator
      schema: olm.channel
      entries:
        - name: rhods-operator.3.5.0
          replaces: rhods-operator.3.4.2
          skipRange: '>=3.4.0 <3.5.0'
    - name: stable-3.5
      package: rhods-operator
      schema: olm.channel
      entries:
        - name: rhods-operator.3.5.0
          skipRange: '>=3.4.0 <3.5.0'
    - name: eus-3.5
      package: rhods-operator
      schema: olm.channel
      entries:
        - name: rhods-operator.3.5.0
    - name: support-required-upgrade-3.5
      package: rhods-operator
      schema: olm.channel
      entries:
      - name: rhods-operator.3.5.0
        skipRange: '>=2.25.8 <2.26.0'

  olm.bundle:
    - quay.io/rhoai/odh-operator-bundle@sha256:b6513cf3cecf03e534eca51f52e835e9d868fa8aca964f772e76600b1a384898
    # only for nudging purpose
