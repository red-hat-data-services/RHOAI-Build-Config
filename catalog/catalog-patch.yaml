patch:
  olm.package:
    name: rhods-operator
    defaultChannel: stable-3.x
  olm.channels:
    - name: stable-3.x
      package: rhods-operator
      schema: olm.channel
      entries:
        - name: rhods-operator.3.5.0
          replaces: rhods-operator.3.4.1
          skipRange: '>=3.4.0 <3.5.0'
    - name: stable-3.5
      package: rhods-operator
      schema: olm.channel
      entries:
        - name: rhods-operator.3.5.0
          skipRange: '>=3.4.0 <3.5.0'
    - name: eus-3.5
      package: rhods-operator
      schema: olm.channel
      entries:
        - name: rhods-operator.3.5.0
    - name: support-required-upgrade-3.5
      package: rhods-operator
      schema: olm.channel
      entries:
      - name: rhods-operator.3.5.0
        skipRange: '>=2.25.8 <2.26.0'

  olm.bundle:
    - quay.io/rhoai/odh-operator-bundle@sha256:805d027359ee99f62f67c63adba6e57cbc604a04c3339c43cf544badaa44c0f1
    # only for nudging purpose
